name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build everything (tokens + docs + api + llms + verify)
        env:
          FIGMA_PAT: ${{ secrets.FIGMA_PAT }}
        run: npm run build:all

      - name: Commit regenerated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add css/tokens/generated/ docs/
          git diff --staged --quiet || git commit -m "chore(ci): regenerate derived artifacts [skip ci]"
          git push origin main
