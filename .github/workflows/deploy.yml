name: Build and Deploy

on:
  push:
    branches: [main]

# Único job de validação. Não escreve no repo.
# Pages é deployado pelo workflow nativo `pages-build-deployment`
# que dispara automaticamente em push para main.
#
# Se este job falhar, o site continua servindo o último deploy bem-sucedido
# (Pages é independente). O dev é notificado para corrigir.
#
# Política: artefatos derivados (css/tokens/generated/, docs/api/, docs/llms*)
# são commitados pelo dev localmente após `npm run build:all`. CI apenas valida
# que `build:all` produz o mesmo output do que está commitado — se divergir,
# falha com mensagem clara.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (necessário pro test-a11y em build:all)
        run: npx playwright install --with-deps chromium

      - name: Build everything (tokens + docs + api + llms + verify)
        env:
          FIGMA_PAT: ${{ secrets.FIGMA_PAT }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: npm run build:all

      - name: Security check — block sensitive content in artifacts
        run: npm run security:check

      - name: Verify generated artifacts match committed state
        run: |
          if ! git diff --quiet css/tokens/generated/ docs/; then
            echo "::error::Artefatos derivados em css/tokens/generated/ ou docs/ não batem com o que foi commitado."
            echo "::error::Rode 'npm run build:all' localmente, commit o diff e re-push."
            git diff --stat css/tokens/generated/ docs/
            exit 1
          fi
          echo "✅ Artefatos commitados batem com o output de build:all."
