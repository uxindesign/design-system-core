name: Verify tokens

on:
  pull_request:
    paths:
      - "tokens/**"
      - "css/tokens/generated/**"
      - "build-tokens.mjs"
      - "scripts/tokens-verify.mjs"
      - ".github/workflows/verify-tokens.yml"
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "css/tokens/generated/**"
      - "build-tokens.mjs"
      - "scripts/tokens-verify.mjs"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build tokens
        run: npm run build:tokens

      - name: Verify tokens
        id: verify
        env:
          FIGMA_PAT: ${{ secrets.FIGMA_PAT }}
        run: |
          set +e
          node scripts/tokens-verify.mjs
          code=$?
          echo "exit_code=$code" >> $GITHUB_OUTPUT
          exit 0

      - name: Comment on PR if divergences
        if: github.event_name == 'pull_request' && steps.verify.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('docs/api/tokens-sync.json', 'utf8'));
            const body = [
              '### ⚠️ tokens-verify detectou divergências',
              '',
              `- Tokens analisados: **${report.totals.jsonTokens}**`,
              `- Erros: **${report.totals.errors}**`,
              `- Avisos: **${report.totals.warnings}**`,
              '',
              'Ver detalhes em `docs/tokens-sync.html` (após merge) ou no log da action.',
              '',
              'Este workflow ainda não bloqueia o merge (fase de descoberta). Planejamos ativar o bloqueio depois de duas semanas estáveis.',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Note — Figma API usage
        if: env.FIGMA_PAT == ''
        run: |
          echo "::notice::FIGMA_PAT secret não configurado. Verificação JSON ↔ Figma pulada. Adicione o secret em Settings → Secrets → Actions para ativar."
